tests:
  - name: "Redirect seriousrooster.nl root to www.seriousrooster.com"
    base: "http://seriousrooster.nl"
    path: "/"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com"

  - name: "Redirect www.seriousrooster.com HTTP to HTTPS"
    base: "http://www.seriousrooster.com"
    path: "/"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com"

  - name: "Redirect www.seriousrooster.nl to www.seriousrooster.com"
    base: "http://www.seriousrooster.nl"
    path: "/"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com"

  - name: "Redirect HTTP contact EN to HTTPS"
    base: "http://www.seriousrooster.com"
    path: "/en/contact.html"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com/en/contact.html"

  - name: "Redirect HTTP contact NL to HTTPS"
    base: "http://www.seriousrooster.com"
    path: "/nl/contact.html"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com/nl/contact.html"

  - name: "Redirect www.seriousrooster.in to www.seriousrooster.com"
    base: "http://www.seriousrooster.in"
    path: "/"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com/"

  - name: "Redirect seriousrooster.eu HTTP to www.seriousrooster.com"
    base: "http://seriousrooster.eu"
    path: "/"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com/"

  - name: "Redirect seriousrooster.nl HTTPS to www.seriousrooster.com"
    base: "https://seriousrooster.nl"
    path: "/"
    expected_status: 301
    expected_redirect: "https://www.seriousrooster.com"

